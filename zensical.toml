[project]
site_name = "Ritter - Mods for Farming Simulator 25"
site_description = "Modding and tools for Farming Simulator 25"
site_url = "https://rittermod.github.io/"
docs_dir = "pages"

nav = [
  { "Home" = "index.md" },
  { "Guides" = [
    { "How to Report a Bug" = "guides/bug-report.md" },
  ] },
  { "Tools" = [
    { "Log Parser" = "tools/log-parser.md" },
  ] },

]

extra_css = ["assets/stylesheets/tools.css"]
extra_javascript = ["assets/js/log-parser.js"]

[project.theme]
font.text = "DM Sans"
font.code = "JetBrains Mono"
features = [
  "navigation.instant",
  #"navigation.tabs",
  "navigation.sections",
  "content.code.copy",
]

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


[project.theme.icon]
logo = "material/tractor-variant"
